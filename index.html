<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#161616">
<title>RM · Compras</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --red:#aa221f; --red-d:#7d1714; --red-soft:#fbeceb;
  --ink:#1d2127; --muted:#6c7480; --gray:#585758;
  --line:#dadee3; --line-2:#eceef1; --bg:#eef0f2; --surface:#ffffff;
  --ok:#1f7a4d; --ok-soft:#e7f3ec; --warn:#b4690e; --warn-soft:#fdf3e2; --danger:#c0392b; --danger-soft:#fdecea;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:"Archivo",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --shadow:0 1px 2px rgba(20,24,32,.06),0 8px 24px rgba(20,24,32,.06);
  --field:#fff; --soft:#f7f8f9; --locked:#f3f4f6;
  --ab1:#222428; --ab2:#161616; /* gradiente da barra (configurável) */
}
html[data-theme="dark"]{
  --ink:#e7e9ee; --muted:#9aa3b2; --gray:#b8bcc6;
  --line:#2c313c; --line-2:#222831; --bg:#15171c; --surface:#1d2127;
  --red-soft:#3a201f; --ok-soft:#15281f; --warn-soft:#2a2113; --danger-soft:#2f1715;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  --field:#161a20; --soft:#1a1e24; --locked:#101317;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
.mono{font-family:var(--mono)}
.r{text-align:right}.c{text-align:center}
button{font-family:inherit}
input,select,textarea{font-family:inherit;color:var(--ink)}

/* ===== appbar (configurável) ===== */
.appbar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--ab1),var(--ab2));color:#fff;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;box-shadow:0 2px 14px rgba(0,0,0,.18);border-bottom:1px solid rgba(255,255,255,.06)}
.appbar.accentline{border-top:3px solid var(--red)}
.appbar .in{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;letter-spacing:.01em}
.brand .logo{width:30px;height:30px;border-radius:9px;background:var(--red);display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.brand .logo svg{width:18px;height:18px;color:#fff}
.brand .tt{display:flex;flex-direction:column;line-height:1.05}
.brand .tt b{font-weight:800;font-size:15px}
.brand .tt small{font-size:10.5px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.06em;text-transform:uppercase}
.spacer{flex:1}
#syncChip{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;white-space:nowrap;background:rgba(255,255,255,.12);color:#cfd3da;cursor:pointer;border:0}
.ab-icon{background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:9px;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.ab-icon:hover{background:rgba(255,255,255,.22)}
.ab-icon svg{width:18px;height:18px}
.ab-btn{background:#fff;color:var(--red);border:0;border-radius:9px;padding:9px 14px;font-size:13.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.ab-btn:hover{filter:brightness(.96)}
.ab-btn svg{width:16px;height:16px}
@media(max-width:560px){ .brand .tt small{display:none} .hide-sm{display:none} .ab-btn{padding:9px 11px} }

.wrap{max-width:1100px;margin:0 auto;padding:16px 16px 84px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.stat .k{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-family:var(--mono);font-weight:700;font-size:19px;margin-top:3px}
.stat.pay .v{color:var(--danger)}
.stat.paid .v{color:var(--ok)}

/* toolbar */
.toolbar{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:170px;display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.search svg{width:16px;height:16px;color:var(--muted);flex:0 0 auto}
.search input{border:0;background:transparent;outline:none;width:100%;font-size:14px}
.fld-in{background:var(--field);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13.5px;outline:none;color:var(--ink)}
.fld-in:focus{border-color:var(--gray)}
select.fld-in{cursor:pointer}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:0;background:var(--surface);color:var(--ink);padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer;border-left:1px solid var(--line)}
.seg button:first-child{border-left:0}
.seg button.on{background:var(--red);color:#fff}

/* list */
.list{display:flex;flex-direction:column;gap:9px}
.row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto;gap:4px 14px;align-items:start}
.row.over{border-color:var(--danger);box-shadow:0 0 0 1px var(--danger) inset, var(--shadow)}
.row .main{grid-column:2;min-width:0}
.row .forn{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row .desc{color:var(--muted);font-size:13px;margin-top:1px;word-break:break-word}
.row .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--line-2);color:var(--gray);white-space:nowrap}
.tag.cat{background:#eef1f4;color:#4a515b}
html[data-theme="dark"] .tag.cat{background:#2a313c;color:#aeb6c2}
.tag.ok{background:var(--ok-soft);color:var(--ok)}
.tag.pend{background:var(--warn-soft);color:var(--warn)}
.tag.over{background:var(--danger-soft);color:var(--danger)}
.tag.deliv{background:var(--ok-soft);color:var(--ok)}
.tag.wait{background:var(--line-2);color:var(--gray)}
.tag.parc{background:var(--red-soft);color:var(--red)}
.row .side{grid-column:3;display:flex;flex-direction:column;align-items:flex-end;gap:6px;text-align:right}
.row .val{font-family:var(--mono);font-weight:700;font-size:16px}
.row .when{font-size:11px;color:var(--muted);white-space:nowrap}
.row .acts{grid-column:1;display:flex;flex-direction:column;gap:6px}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{color:var(--ink);border-color:var(--gray)}
.iconbtn svg{width:15px;height:15px}
.iconbtn.pay{color:var(--ok)}
.empty{background:var(--surface);border:1px dashed var(--line);border-radius:12px;padding:38px 18px;text-align:center;color:var(--muted)}
.empty b{color:var(--ink)}

/* overlay / modal */
.overlay{position:fixed;inset:0;background:rgba(15,17,22,.55);display:none;align-items:flex-start;justify-content:center;padding:max(env(safe-area-inset-top),18px) 14px 18px;z-index:50;overflow:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:560px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;margin:auto}
.mhead{background:linear-gradient(180deg,var(--ab1),var(--ab2));color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px}
.mhead h2{margin:0;font-size:16px;font-weight:700}
.mhead .x{margin-left:auto;background:transparent;border:0;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:0 4px}
.mbody{padding:16px 18px}
.mfoot{padding:13px 18px;background:var(--soft);border-top:1px solid var(--line);display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f{display:flex;flex-direction:column;gap:5px}
.f.span{grid-column:1 / -1}
.lab{font-size:12px;font-weight:600;color:var(--muted)}
.din{width:100%;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;outline:none;color:var(--ink)}
.din:focus{border-color:var(--gray)}
textarea.din{resize:vertical;min-height:58px}
.checkrow{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;cursor:pointer;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--field)}
.checkrow input{width:18px;height:18px;accent-color:var(--red)}
.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:9px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.btn:hover{border-color:var(--gray)}
.btn.red{background:var(--red);color:#fff;border-color:var(--red)}
.btn.red:hover{background:var(--red-d)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 11px;font-size:12.5px}
.note{font-size:12px;color:var(--muted);margin:0}

/* parcelas */
.parcbox{border:1px solid var(--line);border-radius:11px;padding:11px;background:var(--soft);margin-top:4px}
.parc-row{display:grid;grid-template-columns:1.2fr 1fr auto auto;gap:7px;align-items:center;margin-bottom:7px}
.parc-row input{padding:7px 9px}
.parc-row .pg{display:grid;place-items:center}
.parc-row .pg input{width:18px;height:18px;accent-color:var(--ok)}
.parc-x{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--danger);cursor:pointer;font-size:16px;line-height:1}
.parc-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px;font-size:12px;color:var(--muted)}
.parc-foot b{color:var(--ink);font-family:var(--mono)}
.parc-foot .warn{color:var(--warn);font-weight:700}

/* settings */
.cfg-sec{margin:0 0 20px}
.cfg-sec>h3{font:700 12px/1.2 var(--sans);text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 10px;padding-bottom:7px;border-bottom:1px solid var(--line-2)}
.cfg-tog{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-2)}
.cfg-tog:last-child{border-bottom:0}
.cfg-tog .t{font-size:13px;color:var(--ink);font-weight:600}
.cfg-tog .s{font-size:11.5px;color:var(--muted);margin-top:2px}
.cfg-color{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.cfg-color button{width:28px;height:28px;border-radius:50%;border:2px solid var(--surface);box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0}
.cfg-color button.on{box-shadow:0 0 0 2px var(--ink)}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:5px 6px 5px 12px;font-size:12.5px;font-weight:600}
.chip button{border:0;background:var(--line-2);color:var(--gray);width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1}
.chip button:hover{background:var(--danger-soft);color:var(--danger)}
.addrow{display:flex;gap:7px;margin-top:9px}
.addrow input{flex:1}

.asec{margin:15px 0 8px;font:700 12px/1 var(--sans);text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:8px}
.asec.over{color:var(--danger)}
.asec b{font-family:var(--mono);color:var(--ink)}
.brow{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 12px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;margin-bottom:8px}
.brow.over{border-color:var(--danger)}
.bdate{display:grid;place-items:center;width:46px;height:46px;border-radius:10px;background:var(--soft);border:1px solid var(--line);line-height:1.05}
.bdate b{font-family:var(--mono);font-size:15px}
.bdate small{font-size:10px;color:var(--muted)}
.bdate.od{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.bmain{min-width:0}
.bforn{font-weight:700;font-size:14px}
.bdesc{font-size:12.5px;color:var(--muted);word-break:break-word;margin-top:1px}
.bside{display:flex;align-items:center;gap:10px}
.bval{font-family:var(--mono);font-weight:700;font-size:15px;white-space:nowrap}
.bacts{display:flex;gap:6px}
.hidden{display:none!important}

/* responsivo */
@media(max-width:760px){
  .stats{grid-template-columns:1fr 1fr}
  .stat .v{font-size:17px}
  .grid2{grid-template-columns:1fr}
  .row{grid-template-columns:1fr auto;gap:4px 10px}
  .row .acts{grid-column:1;grid-row:3;flex-direction:row;margin-top:8px}
  .row .main{grid-column:1;grid-row:1}
  .row .side{grid-column:2;grid-row:1}
  .parc-row{grid-template-columns:1fr 1fr auto auto}
}
</style>
</head>
<body>

<div class="appbar" id="appbar">
  <div class="in">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8h12l-1 12H7L6 8Z"/><path d="M9 8V6.5a3 3 0 0 1 6 0V8"/></svg></span>
      <span class="tt"><b>Compras</b><small>RM Estruturas</small></span>
    </div>
    <div class="spacer"></div>
    <button id="syncChip" onclick="fbStatusClick()" title="Sincronização com a nuvem">● local</button>
    <button class="ab-icon" onclick="openSettings()" title="Configurações">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 2.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 2.6h0A1.6 1.6 0 0 0 10 1.1V1a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8v0a1.6 1.6 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
    </button>
    <button class="ab-icon" onclick="openMenu()" title="Mais">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
    </button>
    <button class="ab-btn" onclick="openForm()" title="Nova compra">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg><span class="hide-sm">Nova compra</span>
    </button>
  </div>
</div>

<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="seg" id="viewSeg" style="margin-right:2px">
      <button data-v="compras" class="on" onclick="setView('compras')">Compras</button>
      <button data-v="agenda" onclick="setView('agenda')">Agenda</button>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="Buscar fornecedor ou item…" oninput="render()">
    </div>
    <input type="month" id="fMonth" class="fld-in" onchange="render()" title="Mês da compra">
    <select id="fForn" class="fld-in" onchange="render()"></select>
    <select id="fCat" class="fld-in" onchange="render()"></select>
    <div class="seg" id="fPay">
      <button data-v="todos" class="on" onclick="setPay('todos')">Todos</button>
      <button data-v="pend" onclick="setPay('pend')">A pagar</button>
      <button data-v="pago" onclick="setPay('pago')">Pago</button>
    </div>
  </div>
  <div class="list" id="list"></div>
</div>

<!-- FORM -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="mhead">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M6 2h9l5 5v15a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M14 2v5h5"/></svg>
      <h2 id="formTitle">Nova compra</h2>
      <button class="x" onclick="closeForm()">&times;</button>
    </div>
    <div class="mbody">
      <div class="grid2">
        <div class="f span"><div class="lab">De quem comprei *</div><input id="i_forn" class="din" list="fornList" autocomplete="off" placeholder="Fornecedor"></div>
        <datalist id="fornList"></datalist>
        <div class="f span"><div class="lab">O que comprei *</div><input id="i_desc" class="din" placeholder="Descrição do item / serviço"></div>
        <div class="f"><div class="lab">Valor total (R$)</div><input id="i_valor" class="din mono" inputmode="decimal" placeholder="0,00" oninput="onValorChange()"></div>
        <div class="f"><div class="lab">Categoria</div><input id="i_cat" class="din" list="catList" autocomplete="off" placeholder="Ex.: EPI, ferramentas…"></div>
        <datalist id="catList"></datalist>
        <div class="f"><div class="lab">Data da compra</div><input id="i_dcompra" class="din" type="date" onchange="if(parceladoOn())renderParcInfo()"></div>
        <div class="f"><div class="lab">Data de entrega</div><input id="i_dentrega" class="din" type="date"></div>
        <div class="f span"><div class="lab">Prazo de pagamento</div><input id="i_prazo" class="din" list="prazoList" autocomplete="off" placeholder="Ex.: 30/60/90"></div>
        <datalist id="prazoList"></datalist>

        <div class="f span"><label class="checkrow"><input type="checkbox" id="i_parcelado" onchange="toggleParcelado()"> Parcelado em boletos</label></div>

        <!-- pagamento simples -->
        <div class="f" id="wrapVenc"><div class="lab">Vencimento</div><input id="i_venc" class="din" type="date"></div>
        <div class="f" id="wrapPago"><label class="checkrow"><input type="checkbox" id="i_pago"> Já pago</label></div>

        <!-- parcelas -->
        <div class="f span hidden" id="wrapParc">
          <div class="lab" style="display:flex;justify-content:space-between;align-items:center">
            <span>Boletos / parcelas</span>
            <button type="button" class="btn sm" onclick="gerarParcelas()" title="Gera as datas a partir do prazo (ex.: 30/60/90) e divide o valor">↻ Gerar pelo prazo</button>
          </div>
          <div class="parcbox">
            <div id="parcList"></div>
            <div class="parc-foot">
              <button type="button" class="btn sm" onclick="addParcela()">+ parcela</button>
              <span id="parcInfo"></span>
            </div>
          </div>
        </div>

        <div class="f span"><label class="checkrow"><input type="checkbox" id="i_entregue"> Entregue</label></div>
        <div class="f span"><div class="lab">Observações</div><textarea id="i_obs" class="din" placeholder="Opcional"></textarea></div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn red" onclick="saveForm()">Salvar compra</button>
      <button class="btn ghost" onclick="closeForm()">Cancelar</button>
      <span class="spacer" style="flex:1"></span>
      <button class="btn ghost hidden" id="delBtn" onclick="deleteCurrent()" style="color:var(--danger)">Excluir</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="cfgOverlay">
  <div class="modal" style="max-width:560px">
    <div class="mhead">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      <h2>Configurações</h2>
      <button class="x" onclick="closeSettings()">&times;</button>
    </div>
    <div class="mbody" id="cfgBody"></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeSettings()">Fechar</button></div>
  </div>
</div>

<!-- MENU -->
<div class="overlay" id="menuOverlay">
  <div class="modal" style="max-width:440px">
    <div class="mhead"><h2>Mais opções</h2><button class="x" onclick="closeMenu()">&times;</button></div>
    <div class="mbody">
      <div style="display:flex;flex-direction:column;gap:9px">
        <button class="btn" onclick="exportCSV()">⬇ Exportar CSV (planilha)</button>
        <button class="btn" onclick="exportJSON()">⬇ Baixar backup (JSON)</button>
        <button class="btn" onclick="document.getElementById('impFile').click()">⬆ Restaurar backup (JSON)</button>
        <input type="file" id="impFile" accept="application/json" class="hidden" onchange="importJSON(event)">
        <hr style="border:0;border-top:1px solid var(--line-2);margin:4px 0">
        <button class="btn" onclick="fbForcePush()">☁︎ Enviar tudo à nuvem</button>
        <button class="btn" onclick="fbForcePull()">⬇ Baixar tudo da nuvem</button>
        <p class="note" id="menuStat"></p>
      </div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeMenu()">Fechar</button></div>
  </div>
</div>

<script>
/* ============ estado / persistência ============ */
const KEY='rm_compras_v1';
let storageOK=true, mem={};
try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){storageOK=false;}
const DEFAULT_PRAZOS=['à vista','7 dias','15 dias','28 dias','30 dias','30/60','30/60/90','30/60/90/120'];
const DEFAULT_CFG={appbar:'dark',accent:'#aa221f',tema:'light',catPadrao:'',prazoPadrao:'',alertaDias:7};
let DB={compras:[],fornecedores:[],categorias:[],prazos:DEFAULT_PRAZOS.slice(),cfg:Object.assign({},DEFAULT_CFG),_editedAt:0};
let payFilter='todos', editingId=null, FP=[], viewMode='compras';

function uid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayISO(){const d=new Date();return d.toISOString().slice(0,10);}
function round2(n){return Math.round((Number(n)+Number.EPSILON)*100)/100;}
function addDays(iso,n){ if(!iso)return ''; const d=new Date(iso+'T00:00:00'); if(isNaN(d.getTime()))return ''; d.setDate(d.getDate()+(Number(n)||0)); return d.toISOString().slice(0,10); }
function parseBRL(s){ if(s==null)return 0; let str=String(s).replace(/[^0-9.,-]/g,''); if(!str)return 0; if(str.indexOf(',')>=0){str=str.replace(/\./g,'').replace(',','.');} const v=parseFloat(str); return isNaN(v)?0:v; }
function fmtBRL(n){return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtDate(iso){ if(!iso)return ''; const p=String(iso).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:iso; }
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* ---- modelo de parcelas ---- */
function ensureCompra(c){
  if(!Array.isArray(c.parcelas)){
    c.parcelas=[{venc:c.vencimento||'',valor:round2(Number(c.valor)||0),pago:!!c.pago}];
  }
  c.parcelas=c.parcelas.map(p=>({venc:p.venc||'',valor:round2(Number(p.valor)||0),pago:!!p.pago}));
  return c;
}
function parcelasOf(c){ return (Array.isArray(c.parcelas)&&c.parcelas.length)?c.parcelas:[{venc:c.vencimento||'',valor:round2(Number(c.valor)||0),pago:!!c.pago}]; }
function isPaid(c){ const ps=parcelasOf(c); return ps.length>0 && ps.every(p=>p.pago); }
function valorPago(c){ return round2(parcelasOf(c).filter(p=>p.pago).reduce((s,p)=>s+(Number(p.valor)||0),0)); }
function valorAberto(c){ return round2(parcelasOf(c).filter(p=>!p.pago).reduce((s,p)=>s+(Number(p.valor)||0),0)); }
function nextVenc(c){ const u=parcelasOf(c).filter(p=>!p.pago&&p.venc).map(p=>p.venc).sort(); return u[0]||''; }
function isOverdue(c){ return parcelasOf(c).some(p=>!p.pago&&p.venc&&p.venc<todayISO()); }
function nParcelas(c){ return parcelasOf(c).length; }
function parseOffsets(prazo){ const m=String(prazo||'').match(/\d+/g); return m?m.map(Number):[]; }
function genParcelas(prazo,total,dataCompra){
  let offs=parseOffsets(prazo); if(!offs.length)offs=[0];
  const n=offs.length, base=round2((Number(total)||0)/n); let acc=0;
  return offs.map((off,i)=>{ const val=i===n-1?round2((Number(total)||0)-acc):base; acc=round2(acc+base); return {venc:addDays(dataCompra,off),valor:val,pago:false}; });
}

function load(){
  let raw=null;
  try{ raw = storageOK?localStorage.getItem(KEY):mem[KEY]; }catch(e){ raw=mem[KEY]; }
  if(!raw){ try{ raw = storageOK?localStorage.getItem(KEY+'_bak'):null; }catch(e){} }
  if(raw){ try{ const o=JSON.parse(raw); DB=Object.assign({compras:[],fornecedores:[],categorias:[],prazos:DEFAULT_PRAZOS.slice(),cfg:{},_editedAt:0},o); }catch(e){} }
  if(!Array.isArray(DB.compras))DB.compras=[];
  if(!Array.isArray(DB.prazos)||!DB.prazos.length)DB.prazos=DEFAULT_PRAZOS.slice();
  DB.cfg=Object.assign({},DEFAULT_CFG,DB.cfg||{});
  DB.compras.forEach(ensureCompra);
}
function save(stamp){
  if(stamp!==false && !(FB.applying||FB.booting)) DB._editedAt=Date.now();
  rebuildLookups();
  const data=JSON.stringify(DB);
  try{ if(storageOK){ localStorage.setItem(KEY,data); localStorage.setItem(KEY+'_bak',data); } else mem[KEY]=data; }
  catch(e){ mem[KEY]=data; storageOK=false; }
  if(typeof fbQueuePush==='function') fbQueuePush();
}
function rebuildLookups(){
  const fs=new Set(DB.fornecedores||[]), cs=new Set(DB.categorias||[]);
  DB.compras.forEach(c=>{ if(c.fornecedor)fs.add(c.fornecedor); if(c.categoria)cs.add(c.categoria); });
  DB.fornecedores=[...fs].filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  DB.categorias=[...cs].filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR'));
}

/* ============ filtros / cálculos ============ */
function filterCompras(list,f){
  const q=(f.q||'').trim().toLowerCase();
  return list.filter(c=>{
    if(f.month && (c.dataCompra||'').slice(0,7)!==f.month) return false;
    if(f.forn && c.fornecedor!==f.forn) return false;
    if(f.cat && c.categoria!==f.cat) return false;
    if(f.pay==='pago' && !isPaid(c)) return false;
    if(f.pay==='pend' && isPaid(c)) return false;
    if(q){ const hay=((c.fornecedor||'')+' '+(c.descricao||'')+' '+(c.categoria||'')+' '+(c.obs||'')).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
}
function sortCompras(list){
  return list.slice().sort((a,b)=>{ const da=(a.dataCompra||''),db=(b.dataCompra||''); if(da!==db)return da<db?1:-1; return (b.criadoEm||0)-(a.criadoEm||0); });
}
function computeTotals(list){
  let total=0,pago=0,aPagar=0,over=0;
  list.forEach(c=>{ total+=Number(c.valor)||0; pago+=valorPago(c); aPagar+=valorAberto(c); if(isOverdue(c))over+=valorAberto(c); });
  return {total:round2(total),pago:round2(pago),aPagar:round2(aPagar),over:round2(over),count:list.length};
}
function currentFilters(){ return {q:document.getElementById('q').value, month:document.getElementById('fMonth').value, forn:document.getElementById('fForn').value, cat:document.getElementById('fCat').value, pay:payFilter}; }
function allCategorias(){ const s=new Set(DB.categorias||[]); (DB.cfg.categorias||[]).forEach(x=>s.add(x)); return [...s].filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR')); }

/* ============ render ============ */
function render(){
  rebuildLookups();
  const selF=document.getElementById('fForn'),cf=selF.value;
  selF.innerHTML='<option value="">Todos fornecedores</option>'+DB.fornecedores.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('');
  if([...selF.options].some(o=>o.value===cf))selF.value=cf;
  const selC=document.getElementById('fCat'),cc=selC.value, cats=allCategorias();
  selC.innerHTML='<option value="">Todas categorias</option>'+cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  if([...selC.options].some(o=>o.value===cc))selC.value=cc;
  document.getElementById('fornList').innerHTML=DB.fornecedores.map(f=>`<option value="${esc(f)}"></option>`).join('');
  document.getElementById('catList').innerHTML=cats.map(c=>`<option value="${esc(c)}"></option>`).join('');
  document.getElementById('prazoList').innerHTML=(DB.prazos||[]).map(p=>`<option value="${esc(p)}"></option>`).join('');

  const f=currentFilters();
  document.getElementById('fMonth').style.display=viewMode==='agenda'?'none':'';
  document.getElementById('fPay').style.display=viewMode==='agenda'?'none':'';
  if(viewMode==='agenda'){ renderAgenda(f); return; }
  const filtered=sortCompras(filterCompras(DB.compras,f));
  const t=computeTotals(filtered);
  document.getElementById('stats').innerHTML=
    stat('Compras',String(t.count),'')+stat('Total',fmtBRL(t.total),'')+
    stat('A pagar',fmtBRL(t.aPagar),'pay')+stat('Pago',fmtBRL(t.pago),'paid');
  const list=document.getElementById('list');
  if(!filtered.length){ list.innerHTML='<div class="empty">Nenhuma compra'+(DB.compras.length?' com esses filtros.':' ainda. Toque em <b>Nova compra</b> para começar.')+'</div>'; return; }
  list.innerHTML=filtered.map(rowHTML).join('');
}
function stat(k,v,cls){return `<div class="stat ${cls}"><div class="k">${k}</div><div class="v">${v}</div></div>`;}
function rowHTML(c){
  const over=isOverdue(c), paid=isPaid(c), n=nParcelas(c);
  const meta=[];
  if(c.categoria) meta.push(`<span class="tag cat">${esc(c.categoria)}</span>`);
  if(c.prazo) meta.push(`<span class="tag">${esc(c.prazo)}</span>`);
  if(n>1){
    const pagos=parcelasOf(c).filter(p=>p.pago).length;
    meta.push(`<span class="tag parc">${pagos}/${n} boletos</span>`);
  }
  const nv=nextVenc(c);
  if(paid) meta.push('<span class="tag ok">✓ pago</span>');
  else if(over) meta.push(`<span class="tag over">vencido ${fmtDate(nv)}</span>`);
  else if(nv) meta.push(`<span class="tag pend">${n>1?'próx. ':'vence '}${fmtDate(nv)}</span>`);
  else meta.push('<span class="tag pend">a pagar</span>');
  if(c.entregue) meta.push('<span class="tag deliv">entregue</span>');
  else if(c.dataEntrega) meta.push(`<span class="tag wait">entrega ${fmtDate(c.dataEntrega)}</span>`);

  const payTitle=paid?'Desmarcar pagamentos':(n>1?'Dar baixa no próximo boleto':'Marcar como pago');
  return `<div class="row${over?' over':''}">
    <div class="acts">
      <button class="iconbtn" title="Editar" onclick="openForm('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <button class="iconbtn pay" title="${payTitle}" onclick="togglePago('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${paid?'<path d="M3 12h18"/>':'<path d="M20 6L9 17l-5-5"/>'}</svg></button>
    </div>
    <div class="main">
      <div class="forn">${esc(c.fornecedor||'—')}</div>
      <div class="desc">${esc(c.descricao||'')}</div>
      <div class="meta">${meta.join('')}</div>
    </div>
    <div class="side">
      <div class="val">${fmtBRL(c.valor)}</div>
      <div class="when">compra ${fmtDate(c.dataCompra)||'—'}</div>
      ${(!paid&&n>1)?`<div class="when">aberto ${fmtBRL(valorAberto(c))}</div>`:''}
    </div>
  </div>`;
}

/* ============ form ============ */
function parceladoOn(){ return document.getElementById('i_parcelado').checked; }
function toggleParcelado(){
  const on=parceladoOn();
  document.getElementById('wrapParc').classList.toggle('hidden',!on);
  document.getElementById('wrapVenc').classList.toggle('hidden',on);
  document.getElementById('wrapPago').classList.toggle('hidden',on);
  if(on && !FP.length) gerarParcelas();
  if(on) renderParc();
}
function onValorChange(){ if(parceladoOn() && FP.length){ renderParcInfo(); } }
function gerarParcelas(){
  const total=round2(parseBRL(document.getElementById('i_valor').value));
  const prazo=document.getElementById('i_prazo').value;
  const dc=document.getElementById('i_dcompra').value||todayISO();
  FP=genParcelas(prazo,total,dc);
  renderParc();
}
function addParcela(){ FP.push({venc:'',valor:0,pago:false}); renderParc(); }
function removeParcela(i){ FP.splice(i,1); renderParc(); }
function renderParc(){
  const host=document.getElementById('parcList');
  host.innerHTML=FP.map((p,i)=>`<div class="parc-row">
    <input type="date" class="din" value="${p.venc||''}" oninput="FP[${i}].venc=this.value;renderParcInfo()">
    <input class="din mono" inputmode="decimal" placeholder="0,00" value="${p.valor?String(p.valor).replace('.',','):''}" oninput="FP[${i}].valor=parseBRL(this.value);renderParcInfo()">
    <label class="pg" title="Pago"><input type="checkbox" ${p.pago?'checked':''} onchange="FP[${i}].pago=this.checked"></label>
    <button type="button" class="parc-x" onclick="removeParcela(${i})">&times;</button>
  </div>`).join('');
  renderParcInfo();
}
function renderParcInfo(){
  const total=round2(parseBRL(document.getElementById('i_valor').value));
  const soma=round2(FP.reduce((s,p)=>s+(Number(p.valor)||0),0));
  const diff=round2(total-soma);
  const el=document.getElementById('parcInfo');
  el.innerHTML=`Soma: <b>${fmtBRL(soma)}</b> / total <b>${fmtBRL(total)}</b>`+(Math.abs(diff)>=0.01?` <span class="warn">(dif. ${fmtBRL(diff)})</span>`:'');
}
function openForm(id){
  editingId=id||null; const g=k=>document.getElementById(k);
  if(editingId){
    const c=DB.compras.find(x=>x.id===editingId)||{}; ensureCompra(c);
    g('formTitle').textContent='Editar compra'; g('delBtn').classList.remove('hidden');
    g('i_forn').value=c.fornecedor||''; g('i_desc').value=c.descricao||'';
    g('i_valor').value=c.valor!=null?String(c.valor).replace('.',','):''; g('i_cat').value=c.categoria||'';
    g('i_dcompra').value=c.dataCompra||''; g('i_dentrega').value=c.dataEntrega||''; g('i_prazo').value=c.prazo||'';
    g('i_entregue').checked=!!c.entregue; g('i_obs').value=c.obs||'';
    const ps=parcelasOf(c);
    if(ps.length>1){ g('i_parcelado').checked=true; FP=ps.map(p=>({venc:p.venc,valor:p.valor,pago:p.pago})); g('i_venc').value=''; g('i_pago').checked=false; }
    else { g('i_parcelado').checked=false; FP=[]; g('i_venc').value=ps[0].venc||''; g('i_pago').checked=!!ps[0].pago; }
  } else {
    g('formTitle').textContent='Nova compra'; g('delBtn').classList.add('hidden');
    ['i_forn','i_desc','i_valor','i_dentrega','i_venc','i_obs'].forEach(k=>g(k).value='');
    g('i_cat').value=DB.cfg.catPadrao||''; g('i_prazo').value=DB.cfg.prazoPadrao||'';
    g('i_dcompra').value=todayISO(); g('i_pago').checked=false; g('i_entregue').checked=false; g('i_parcelado').checked=false; FP=[];
  }
  toggleParcelado(); render();
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(()=>g('i_forn').focus(),50);
}
function closeForm(){document.getElementById('formOverlay').classList.remove('open');}
function collectParcelas(total){
  if(parceladoOn()){
    const ps=FP.map(p=>({venc:p.venc||'',valor:round2(Number(p.valor)||0),pago:!!p.pago})).filter(p=>p.venc||p.valor>0);
    return ps.length?ps:[{venc:'',valor:round2(total),pago:false}];
  }
  return [{venc:document.getElementById('i_venc').value||'',valor:round2(total),pago:document.getElementById('i_pago').checked}];
}
function saveForm(){
  const g=k=>document.getElementById(k).value;
  const forn=g('i_forn').trim(), desc=g('i_desc').trim();
  if(!forn){alert('Informe de quem você comprou.');return;}
  if(!desc){alert('Informe o que você comprou.');return;}
  const total=round2(parseBRL(g('i_valor')));
  const rec={ fornecedor:forn, descricao:desc, valor:total, categoria:g('i_cat').trim(),
    dataCompra:g('i_dcompra')||todayISO(), dataEntrega:g('i_dentrega'), prazo:g('i_prazo').trim(),
    parcelas:collectParcelas(total), entregue:document.getElementById('i_entregue').checked, obs:g('i_obs').trim() };
  if(editingId){ const c=DB.compras.find(x=>x.id===editingId); if(c){ delete c.vencimento; delete c.pago; Object.assign(c,rec);} }
  else { rec.id=uid(); rec.criadoEm=Date.now(); DB.compras.unshift(rec); }
  save(); render(); closeForm(); toast(editingId?'Compra atualizada':'Compra registrada');
}
function deleteCurrent(){ if(!editingId)return; if(!confirm('Excluir esta compra? Esta ação não pode ser desfeita.'))return; DB.compras=DB.compras.filter(x=>x.id!==editingId); save(); render(); closeForm(); toast('Compra excluída'); }
function togglePago(id){
  const c=DB.compras.find(x=>x.id===id); if(!c)return; ensureCompra(c);
  if(isPaid(c)){ c.parcelas.forEach(p=>p.pago=false); toast('Pagamentos desmarcados'); }
  else { const unpaid=c.parcelas.filter(p=>!p.pago); unpaid.sort((a,b)=>(a.venc||'9999')<(b.venc||'9999')?-1:1); if(unpaid[0])unpaid[0].pago=true; toast(c.parcelas.length>1?'Boleto baixado':'Marcada como paga'); }
  save(); render();
}
function setPay(v){ payFilter=v; [...document.querySelectorAll('#fPay button')].forEach(b=>b.classList.toggle('on',b.dataset.v===v)); render(); }

/* ============ Agenda de vencimentos ============ */
function setView(v){ viewMode=v; [...document.querySelectorAll('#viewSeg button')].forEach(b=>b.classList.toggle('on',b.dataset.v===v)); render(); }
function boletosAbertos(f){
  const base=filterCompras(DB.compras,{q:f.q,forn:f.forn,cat:f.cat});
  const items=[];
  base.forEach(c=>parcelasOf(c).forEach((p,idx)=>{ if(!p.pago) items.push({id:c.id,c,idx,venc:p.venc||'',valor:Number(p.valor)||0}); }));
  items.sort((a,b)=>{ const av=a.venc||'9999-99-99',bv=b.venc||'9999-99-99'; return av<bv?-1:av>bv?1:0; });
  return items;
}
const BUCKETS=[['vencido','Vencidos','over'],['hoje','Vence hoje','pend'],['s7','Próximos 7 dias','pend'],['s30','Próximos 30 dias',''],['fut','Mais adiante',''],['sem','Sem vencimento','']];
function bucketOf(venc){ if(!venc)return 'sem'; const t=todayISO(); if(venc<t)return 'vencido'; if(venc===t)return 'hoje'; if(venc<=addDays(t,7))return 's7'; if(venc<=addDays(t,30))return 's30'; return 'fut'; }
function pagarBoleto(id,idx){ const c=DB.compras.find(x=>x.id===id); if(!c)return; ensureCompra(c); if(c.parcelas[idx]){ c.parcelas[idx].pago=true; save(); render(); toast('Boleto baixado'); } }
function agendaRow(it){
  const c=it.c, n=nParcelas(c), pidx=it.idx+1, over=it.venc&&it.venc<todayISO();
  const badge=it.venc?`<b>${it.venc.slice(8,10)}/${it.venc.slice(5,7)}</b><small>${it.venc.slice(2,4)}</small>`:'<b>—</b>';
  return `<div class="brow${over?' over':''}">
    <div class="bdate${over?' od':''}">${badge}</div>
    <div class="bmain"><div class="bforn">${esc(c.fornecedor||'—')}</div><div class="bdesc">${esc(c.descricao||'')}${n>1?' · parcela '+pidx+'/'+n:''}${c.categoria?' · '+esc(c.categoria):''}</div></div>
    <div class="bside"><div class="bval">${fmtBRL(it.valor)}</div><div class="bacts">
      <button class="iconbtn pay" title="Dar baixa neste boleto" onclick="pagarBoleto('${c.id}',${it.idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg></button>
      <button class="iconbtn" title="Abrir compra" onclick="openForm('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
    </div></div>
  </div>`;
}
function renderAgenda(f){
  const items=boletosAbertos(f);
  let totalAberto=0,venc=0,p7=0,p30=0;
  items.forEach(it=>{ totalAberto+=it.valor; const b=bucketOf(it.venc);
    if(b==='vencido')venc+=it.valor;
    if(b==='hoje'||b==='s7')p7+=it.valor;
    if(b==='hoje'||b==='s7'||b==='s30')p30+=it.valor; });
  document.getElementById('stats').innerHTML=
    stat('Vencido',fmtBRL(round2(venc)),'pay')+stat('7 dias',fmtBRL(round2(p7)),'')+
    stat('30 dias',fmtBRL(round2(p30)),'')+stat('Total aberto',fmtBRL(round2(totalAberto)),'');
  const list=document.getElementById('list');
  if(!items.length){ list.innerHTML='<div class="empty">Nenhum boleto em aberto. <b>Tudo em dia!</b></div>'; return; }
  const groups={}; items.forEach(it=>{ const b=bucketOf(it.venc); (groups[b]=groups[b]||[]).push(it); });
  let html='';
  BUCKETS.forEach(bk=>{ const arr=groups[bk[0]]; if(!arr||!arr.length)return;
    const sum=round2(arr.reduce((s,x)=>s+x.valor,0));
    html+=`<div class="asec${bk[2]==='over'?' over':''}"><span>${bk[1]} · ${arr.length}</span><b>${fmtBRL(sum)}</b></div>`+arr.map(agendaRow).join('');
  });
  list.innerHTML=html;
}


/* ============ configurações ============ */
const ACCENTS=[['#aa221f','Vermelho RM'],['#1f5fae','Azul'],['#1f7a4d','Verde'],['#7a4dab','Roxo'],['#b4690e','Âmbar'],['#222428','Grafite']];
const APPBARS={dark:['#222428','#161616'],graphite:['#3a3f47','#23262b'],red:['#c0392b','#7d1714']};
function applyCfg(){
  const c=DB.cfg||DEFAULT_CFG;
  document.documentElement.style.setProperty('--red',c.accent||'#aa221f');
  document.documentElement.style.setProperty('--red-d',shade(c.accent||'#aa221f',.28));
  const ab=APPBARS[c.appbar]||APPBARS.dark;
  document.documentElement.style.setProperty('--ab1',ab[0]);
  document.documentElement.style.setProperty('--ab2',ab[1]);
  document.documentElement.setAttribute('data-theme',c.tema==='dark'?'dark':'light');
  document.querySelector('meta[name=theme-color]').setAttribute('content',ab[1]);
}
function shade(hex,p){ const m=/^#?([0-9a-f]{6})$/i.exec(hex||''); if(!m)return hex; const n=parseInt(m[1],16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r*(1-p));g=Math.round(g*(1-p));b=Math.round(b*(1-p)); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function setCfg(k,v){ DB.cfg[k]=v; save(); applyCfg(); renderSettings(); render(); }
function openSettings(){ renderSettings(); document.getElementById('cfgOverlay').classList.add('open'); }
function closeSettings(){ document.getElementById('cfgOverlay').classList.remove('open'); }
function renderSettings(){
  const c=DB.cfg; const host=document.getElementById('cfgBody');
  const seg=(key,opts)=>`<div class="seg">${opts.map(o=>`<button class="${c[key]===o[0]?'on':''}" onclick="setCfg('${key}','${o[0]}')">${o[1]}</button>`).join('')}</div>`;
  const colors=ACCENTS.map(a=>`<button title="${a[1]}" style="background:${a[0]}" class="${(c.accent||'#aa221f')===a[0]?'on':''}" onclick="setCfg('accent','${a[0]}')"></button>`).join('');
  const prazos=(DB.prazos||[]).map((p,i)=>`<span class="chip">${esc(p)}<button onclick="removePrazo(${i})" title="Remover">&times;</button></span>`).join('');
  const cats=(DB.cfg.categorias||[]).map((p,i)=>`<span class="chip">${esc(p)}<button onclick="removeCat(${i})" title="Remover">&times;</button></span>`).join('');
  const catOpts='<option value="">— nenhuma —</option>'+allCategorias().map(x=>`<option value="${esc(x)}"${c.catPadrao===x?' selected':''}>${esc(x)}</option>`).join('');
  const prazoOpts='<option value="">— nenhum —</option>'+(DB.prazos||[]).map(x=>`<option value="${esc(x)}"${c.prazoPadrao===x?' selected':''}>${esc(x)}</option>`).join('');
  host.innerHTML=`
  <div class="cfg-sec"><h3>Aparência</h3>
    <div class="cfg-tog"><div><div class="t">Barra superior</div><div class="s">Cor do topo do app.</div></div>${seg('appbar',[['dark','Escuro'],['graphite','Grafite'],['red','Vermelho']])}</div>
    <div class="cfg-tog"><div><div class="t">Cor de destaque</div><div class="s">Botões e marcações.</div></div><div class="cfg-color">${colors}</div></div>
    <div class="cfg-tog"><div><div class="t">Tema</div></div>${seg('tema',[['light','Claro'],['dark','Escuro']])}</div>
  </div>
  <div class="cfg-sec"><h3>Padrões de nova compra</h3>
    <div class="grid2">
      <div class="f"><div class="lab">Categoria padrão</div><select class="din" onchange="setCfg('catPadrao',this.value)">${catOpts}</select></div>
      <div class="f"><div class="lab">Prazo padrão</div><select class="din" onchange="setCfg('prazoPadrao',this.value)">${prazoOpts}</select></div>
    </div>
  </div>
  <div class="cfg-sec"><h3>Prazos de pagamento</h3>
    <div class="s" style="font-size:11.5px;color:var(--muted);margin-bottom:6px">Estas opções aparecem ao registrar uma compra. Use barras para parcelar (ex.: 30/60/90/120).</div>
    <div class="chips">${prazos||'<span class="note">Nenhum.</span>'}</div>
    <div class="addrow"><input id="newPrazo" class="din" placeholder="Ex.: 30/60/90/120" onkeydown="if(event.key==='Enter')addPrazo()"><button class="btn red" onclick="addPrazo()">Adicionar</button></div>
  </div>
  <div class="cfg-sec"><h3>Categorias</h3>
    <div class="s" style="font-size:11.5px;color:var(--muted);margin-bottom:6px">Categorias fixas para o autocompletar (as usadas nas compras entram sozinhas).</div>
    <div class="chips">${cats||'<span class="note">Nenhuma fixa.</span>'}</div>
    <div class="addrow"><input id="newCat" class="din" placeholder="Ex.: EPI" onkeydown="if(event.key==='Enter')addCat()"><button class="btn red" onclick="addCat()">Adicionar</button></div>
  </div>
  <div class="cfg-sec"><h3>Alertas</h3>
    <div class="cfg-tog"><div><div class="t">Avisar "vence em breve"</div><div class="s">Quantos dias antes destacar o vencimento.</div></div>
      <input class="din mono" style="width:74px" inputmode="numeric" value="${Number(c.alertaDias)||0}" onchange="setCfg('alertaDias',Math.max(0,parseInt(this.value)||0))"></div>
  </div>`;
}
function addPrazo(){ const el=document.getElementById('newPrazo'); const v=(el.value||'').trim(); if(!v)return; if(!DB.prazos.includes(v))DB.prazos.push(v); el.value=''; save(); renderSettings(); render(); }
function removePrazo(i){ DB.prazos.splice(i,1); save(); renderSettings(); render(); }
function addCat(){ const el=document.getElementById('newCat'); const v=(el.value||'').trim(); if(!v)return; DB.cfg.categorias=DB.cfg.categorias||[]; if(!DB.cfg.categorias.includes(v))DB.cfg.categorias.push(v); el.value=''; save(); renderSettings(); render(); }
function removeCat(i){ (DB.cfg.categorias||[]).splice(i,1); save(); renderSettings(); render(); }

/* ============ menu / export ============ */
function openMenu(){ document.getElementById('menuStat').textContent=DB.compras.length+' compra(s) · última edição '+(DB._editedAt?new Date(DB._editedAt).toLocaleString('pt-BR'):'—'); document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu(){ document.getElementById('menuOverlay').classList.remove('open'); }
function download(name,content,type){ const blob=new Blob([content],{type:type||'application/octet-stream'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100); }
function exportJSON(){ download('compras-backup-'+todayISO()+'.json',JSON.stringify(DB,null,2),'application/json'); toast('Backup gerado'); }
function csvCell(s){ s=String(s==null?'':s); return /[";\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function exportCSV(){
  const rows=sortCompras(filterCompras(DB.compras,currentFilters()));
  const head=['Data compra','Fornecedor','Item','Categoria','Valor total','Prazo','Parcelas','Vencimentos','Pago (R$)','Em aberto (R$)','Status','Data entrega','Entregue','Observações'];
  const lines=[head.join(';')];
  rows.forEach(c=>{ const ps=parcelasOf(c); const status=isPaid(c)?'Pago':(valorPago(c)>0?'Parcial':'Em aberto');
    lines.push([fmtDate(c.dataCompra),c.fornecedor,c.descricao,c.categoria,String(c.valor==null?'':c.valor).replace('.',','),c.prazo,
      ps.length, ps.map(p=>fmtDate(p.venc)).filter(Boolean).join(' | '),
      String(valorPago(c)).replace('.',','),String(valorAberto(c)).replace('.',','),status,
      fmtDate(c.dataEntrega),c.entregue?'Sim':'Não',c.obs].map(csvCell).join(';')); });
  download('compras-'+todayISO()+'.csv','\ufeff'+lines.join('\r\n'),'text/csv;charset=utf-8'); toast(rows.length+' linha(s) exportada(s)');
}
function importJSON(ev){ const file=ev.target.files[0]; if(!file)return; const rd=new FileReader();
  rd.onload=()=>{ try{ const o=JSON.parse(rd.result); if(!o||!Array.isArray(o.compras))throw 0;
    if(!confirm('Restaurar este backup vai substituir as compras atuais ('+DB.compras.length+'). Continuar?'))return;
    DB=Object.assign({compras:[],fornecedores:[],categorias:[],prazos:DEFAULT_PRAZOS.slice(),cfg:{},_editedAt:0},o);
    DB.cfg=Object.assign({},DEFAULT_CFG,DB.cfg||{}); DB.compras.forEach(ensureCompra);
    save(); applyCfg(); render(); closeMenu(); toast('Backup restaurado');
  }catch(e){ alert('Arquivo inválido.'); } }; rd.readAsText(file); ev.target.value=''; }

/* ============ toast ============ */
let toastT=null;
function toast(msg){ let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1d2127;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .2s'; document.body.appendChild(el); }
  el.textContent=msg; el.style.opacity='1'; clearTimeout(toastT); toastT=setTimeout(()=>{el.style.opacity='0';},2200); }

/* ============ Firebase (rm-contas / nó compras_rm) ============ */
const FB={ config:{apiKey:"AIzaSyBDOR9f748UNoGP5c72Y-vdmDBcffM8tMI",databaseURL:"https://rm-contas-default-rtdb.firebaseio.com",appId:"1:414740463069:web:f8035314dcfbf962c80a34"}, node:'compras_rm', ref:null, ready:false, applying:false, booting:true, timer:null };
function setSync(state){ const c=document.getElementById('syncChip'); if(!c)return;
  const map={ok:['● nuvem','rgba(31,122,77,.25)','#7fe0a8'],saving:['● salvando…','rgba(180,105,14,.25)','#ffd98a'],off:['● local','rgba(255,255,255,.12)','#cfd3da'],pend:['● pendente','rgba(180,105,14,.25)','#ffd98a']};
  const m=map[state]||map.off; c.textContent=m[0]; c.style.background=m[1]; c.style.color=m[2]; }
function cloudData(){ const o=JSON.parse(JSON.stringify(DB)); o._updatedAt=Date.now(); return o; }
function fbInit(){ try{ if(!window.firebase||!firebase.initializeApp){ setSync('off'); return; }
  firebase.initializeApp(FB.config); FB.ref=firebase.database().ref(FB.node); FB.ready=true; setSync('saving');
  FB.ref.on('value',snap=>{ const v=snap.val(); if(!v){ if((DB.compras||[]).length)fbPush(); else setSync('ok'); return; }
    const remote=v._updatedAt||0, local=DB._editedAt||0; if(remote>=local){fbApply(v);}else{fbPush();} },err=>{setSync('off');});
  }catch(e){ setSync('off'); } }
function fbApply(v){ FB.applying=true; DB=Object.assign({compras:[],fornecedores:[],categorias:[],prazos:DEFAULT_PRAZOS.slice(),cfg:{},_editedAt:0},v);
  DB.cfg=Object.assign({},DEFAULT_CFG,DB.cfg||{}); if(!Array.isArray(DB.prazos)||!DB.prazos.length)DB.prazos=DEFAULT_PRAZOS.slice(); DB.compras.forEach(ensureCompra);
  DB._editedAt=v._updatedAt||DB._editedAt||0; save(false); applyCfg(); render(); FB.applying=false; setSync('ok'); }
function fbPush(){ if(!FB.ready||!FB.ref)return; setSync('saving'); FB.ref.set(cloudData()).then(()=>setSync('ok')).catch(()=>setSync('off')); }
function fbQueuePush(){ if(!FB.ready||FB.applying||FB.booting)return; setSync('saving'); clearTimeout(FB.timer); FB.timer=setTimeout(fbPush,700); }
function fbForcePush(){ if(!FB.ready){toast('Nuvem indisponível');return;} fbPush(); toast('Enviado à nuvem'); closeMenu(); }
function fbForcePull(){ if(!FB.ready||!FB.ref){toast('Nuvem indisponível');return;} FB.ref.once('value').then(s=>{const v=s.val(); if(v){fbApply(v);toast('Baixado da nuvem');} else toast('Nuvem vazia');}); closeMenu(); }
function fbStatusClick(){ if(!FB.ready){toast('Sincronização offline — dados salvos só neste aparelho');return;} fbForcePull(); }

/* ============ boot ============ */
load(); applyCfg(); render();
FB.booting=false; fbInit();
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o){ o.classList.remove('open'); } }));
if(window.addEventListener){ window.addEventListener('pagehide',()=>save(false)); }
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
