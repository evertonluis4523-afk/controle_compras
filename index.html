<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#161616">
<title>RM · Compras</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
:root{
  --appbar:#161616; --red:#aa221f; --red-d:#7d1714; --red-soft:#fbeceb;
  --ink:#1d2127; --muted:#6c7480; --gray:#585758;
  --line:#dadee3; --line-2:#eceef1; --bg:#eef0f2; --surface:#ffffff;
  --ok:#1f7a4d; --ok-soft:#e7f3ec; --warn:#b4690e; --warn-soft:#fdf3e2; --danger:#c0392b; --danger-soft:#fdecea;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:"Archivo",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --shadow:0 1px 2px rgba(20,24,32,.06),0 8px 24px rgba(20,24,32,.06);
  --field:#fff; --soft:#f7f8f9; --locked:#f3f4f6;
}
html[data-theme="dark"]{
  --ink:#e7e9ee; --muted:#9aa3b2; --gray:#b8bcc6;
  --line:#2c313c; --line-2:#222831; --bg:#15171c; --surface:#1d2127;
  --red-soft:#3a201f; --ok-soft:#15281f; --warn-soft:#2a2113; --danger-soft:#2f1715;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.35);
  --field:#161a20; --soft:#1a1e24; --locked:#101317;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
.mono{font-family:var(--mono)}
.r{text-align:right}.c{text-align:center}
button{font-family:inherit}
input,select,textarea{font-family:inherit;color:var(--ink)}

/* appbar */
.appbar{position:sticky;top:0;z-index:30;background:var(--appbar);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 16px 10px}
.appbar .in{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.01em}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(170,34,31,.18)}
.brand b{font-weight:800}
.spacer{flex:1}
#syncChip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;background:#2a2a2a;color:#bbb;cursor:pointer;border:0}
.ab-btn{background:#262626;color:#fff;border:0;border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.ab-btn:hover{background:#323232}
.ab-btn.primary{background:var(--red)}
.ab-btn.primary:hover{background:var(--red-d)}
.ab-btn svg{width:16px;height:16px}
.ab-icon{background:#262626;color:#fff;border:0;border-radius:9px;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.ab-icon:hover{background:#323232}
.ab-icon svg{width:18px;height:18px}

.wrap{max-width:1100px;margin:0 auto;padding:16px 16px 80px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.stat .k{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-family:var(--mono);font-weight:700;font-size:19px;margin-top:3px}
.stat.pay .v{color:var(--danger)}
.stat.paid .v{color:var(--ok)}

/* toolbar */
.toolbar{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.search svg{width:16px;height:16px;color:var(--muted);flex:0 0 auto}
.search input{border:0;background:transparent;outline:none;width:100%;font-size:14px}
.fld-in{background:var(--field);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13.5px;outline:none}
.fld-in:focus{border-color:var(--gray)}
select.fld-in{cursor:pointer}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:0;background:var(--surface);color:var(--ink);padding:8px 12px;font-size:12.5px;font-weight:600;cursor:pointer;border-left:1px solid var(--line)}
.seg button:first-child{border-left:0}
.seg button.on{background:var(--red);color:#fff}

/* list */
.list{display:flex;flex-direction:column;gap:9px}
.row{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);display:grid;grid-template-columns:auto 1fr auto;gap:4px 14px;align-items:start}
.row.over{border-color:var(--danger);box-shadow:0 0 0 1px var(--danger) inset, var(--shadow)}
.row .main{grid-column:2;min-width:0}
.row .forn{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row .desc{color:var(--muted);font-size:13px;margin-top:1px;word-break:break-word}
.row .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--line-2);color:var(--gray);white-space:nowrap}
.tag.cat{background:#eef1f4;color:#4a515b}
.tag.ok{background:var(--ok-soft);color:var(--ok)}
.tag.pend{background:var(--warn-soft);color:var(--warn)}
.tag.over{background:var(--danger-soft);color:var(--danger)}
.tag.deliv{background:var(--ok-soft);color:var(--ok)}
.tag.wait{background:var(--line-2);color:var(--gray)}
.row .side{grid-column:3;display:flex;flex-direction:column;align-items:flex-end;gap:6px;text-align:right}
.row .val{font-family:var(--mono);font-weight:700;font-size:16px}
.row .when{font-size:11px;color:var(--muted);white-space:nowrap}
.row .acts{grid-column:1;display:flex;flex-direction:column;gap:6px}
.iconbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.iconbtn:hover{color:var(--ink);border-color:var(--gray)}
.iconbtn svg{width:15px;height:15px}
.iconbtn.pay{color:var(--ok)}
.empty{background:var(--surface);border:1px dashed var(--line);border-radius:12px;padding:38px 18px;text-align:center;color:var(--muted)}
.empty b{color:var(--ink)}

/* overlay / modal */
.overlay{position:fixed;inset:0;background:rgba(15,17,22,.55);display:none;align-items:flex-start;justify-content:center;padding:max(env(safe-area-inset-top),18px) 14px 18px;z-index:50;overflow:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);width:100%;max-width:560px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;margin:auto}
.mhead{background:var(--appbar);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px}
.mhead h2{margin:0;font-size:16px;font-weight:700}
.mhead .x{margin-left:auto;background:transparent;border:0;color:#fff;font-size:24px;line-height:1;cursor:pointer;padding:0 4px}
.mbody{padding:16px 18px}
.mfoot{padding:13px 18px;background:var(--soft);border-top:1px solid var(--line);display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f{display:flex;flex-direction:column;gap:5px}
.f.span{grid-column:1 / -1}
.lab{font-size:12px;font-weight:600;color:var(--muted)}
.din{width:100%;background:var(--field);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;outline:none}
.din:focus{border-color:var(--gray)}
textarea.din{resize:vertical;min-height:58px}
.checkrow{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;cursor:pointer;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--field)}
.checkrow input{width:18px;height:18px;accent-color:var(--red)}
.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:9px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
.btn:hover{border-color:var(--gray)}
.btn.red{background:var(--red);color:#fff;border-color:var(--red)}
.btn.red:hover{background:var(--red-d)}
.btn.ghost{background:transparent}
.note{font-size:12px;color:var(--muted);margin:0}

/* responsivo */
@media(max-width:760px){
  .stats{grid-template-columns:1fr 1fr}
  .stat .v{font-size:17px}
  .grid2{grid-template-columns:1fr}
  .row{grid-template-columns:1fr auto;gap:4px 10px}
  .row .acts{grid-column:1;grid-row:3;flex-direction:row;margin-top:8px}
  .row .main{grid-column:1;grid-row:1}
  .row .side{grid-column:2;grid-row:1}
}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="appbar">
  <div class="in">
    <div class="brand"><span class="dot"></span><span><b>RM</b> · Compras</span></div>
    <div class="spacer"></div>
    <button id="syncChip" onclick="fbStatusClick()" title="Sincronização com a nuvem">● local</button>
    <button class="ab-icon" onclick="toggleTema()" title="Tema claro/escuro" id="temaBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="ab-icon" onclick="openMenu()" title="Mais" id="menuBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
    </button>
    <button class="ab-btn primary" onclick="openForm()" title="Nova compra">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg><span class="hide-sm">Nova compra</span>
    </button>
  </div>
</div>

<div class="wrap">
  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" placeholder="Buscar fornecedor ou item…" oninput="render()">
    </div>
    <input type="month" id="fMonth" class="fld-in" onchange="render()" title="Mês da compra">
    <select id="fForn" class="fld-in" onchange="render()"></select>
    <div class="seg" id="fPay">
      <button data-v="todos" class="on" onclick="setPay('todos')">Todos</button>
      <button data-v="pend" onclick="setPay('pend')">A pagar</button>
      <button data-v="pago" onclick="setPay('pago')">Pago</button>
    </div>
  </div>

  <div class="list" id="list"></div>
</div>

<!-- FORM -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="mhead">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path d="M6 2h9l5 5v15a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M14 2v5h5"/></svg>
      <h2 id="formTitle">Nova compra</h2>
      <button class="x" onclick="closeForm()">&times;</button>
    </div>
    <div class="mbody">
      <div class="grid2">
        <div class="f span"><div class="lab">De quem comprei *</div><input id="i_forn" class="din" list="fornList" autocomplete="off" placeholder="Fornecedor"></div>
        <datalist id="fornList"></datalist>
        <div class="f span"><div class="lab">O que comprei *</div><input id="i_desc" class="din" placeholder="Descrição do item / serviço"></div>
        <div class="f"><div class="lab">Valor (R$)</div><input id="i_valor" class="din mono" inputmode="decimal" placeholder="0,00"></div>
        <div class="f"><div class="lab">Categoria</div><input id="i_cat" class="din" list="catList" autocomplete="off" placeholder="Ex.: EPI, ferramentas…"></div>
        <datalist id="catList"></datalist>
        <div class="f"><div class="lab">Data da compra</div><input id="i_dcompra" class="din" type="date"></div>
        <div class="f"><div class="lab">Data de entrega</div><input id="i_dentrega" class="din" type="date"></div>
        <div class="f"><div class="lab">Prazo de pagamento</div><input id="i_prazo" class="din" list="prazoList" autocomplete="off" placeholder="Ex.: 30 dias, à vista"></div>
        <datalist id="prazoList">
          <option value="à vista"></option><option value="7 dias"></option><option value="15 dias"></option>
          <option value="28 dias"></option><option value="30 dias"></option><option value="28/35 dias"></option>
          <option value="30/60 dias"></option><option value="30/60/90 dias"></option>
        </datalist>
        <div class="f"><div class="lab">Vencimento</div><input id="i_venc" class="din" type="date"></div>
        <div class="f"><label class="checkrow"><input type="checkbox" id="i_pago"> Já pago</label></div>
        <div class="f"><label class="checkrow"><input type="checkbox" id="i_entregue"> Entregue</label></div>
        <div class="f span"><div class="lab">Observações</div><textarea id="i_obs" class="din" placeholder="Opcional"></textarea></div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn red" onclick="saveForm()" id="saveBtn">Salvar compra</button>
      <button class="btn ghost" onclick="closeForm()">Cancelar</button>
      <span class="spacer" style="flex:1"></span>
      <button class="btn ghost hidden" id="delBtn" onclick="deleteCurrent()" style="color:var(--danger)">Excluir</button>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="overlay" id="menuOverlay">
  <div class="modal" style="max-width:440px">
    <div class="mhead"><h2>Mais opções</h2><button class="x" onclick="closeMenu()">&times;</button></div>
    <div class="mbody">
      <div style="display:flex;flex-direction:column;gap:9px">
        <button class="btn" onclick="exportCSV()">⬇ Exportar CSV (planilha)</button>
        <button class="btn" onclick="exportJSON()">⬇ Baixar backup (JSON)</button>
        <button class="btn" onclick="document.getElementById('impFile').click()">⬆ Restaurar backup (JSON)</button>
        <input type="file" id="impFile" accept="application/json" class="hidden" onchange="importJSON(event)">
        <hr style="border:0;border-top:1px solid var(--line-2);margin:4px 0">
        <button class="btn" onclick="fbForcePush()">☁︎ Enviar tudo à nuvem</button>
        <button class="btn" onclick="fbForcePull()">⬇ Baixar tudo da nuvem</button>
        <p class="note" id="menuStat"></p>
      </div>
    </div>
    <div class="mfoot"><button class="btn ghost" onclick="closeMenu()">Fechar</button></div>
  </div>
</div>

<script>
/* ============ estado / persistência ============ */
const KEY='rm_compras_v1';
let storageOK=true, mem={};
try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){storageOK=false;}
let DB={compras:[],fornecedores:[],categorias:[],_editedAt:0};
let payFilter='todos', editingId=null;

function uid(){return 'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayISO(){const d=new Date();return d.toISOString().slice(0,10);}
function round2(n){return Math.round((Number(n)+Number.EPSILON)*100)/100;}
function parseBRL(s){
  if(s==null)return 0; let str=String(s).replace(/[^0-9.,-]/g,''); if(!str)return 0;
  if(str.indexOf(',')>=0){str=str.replace(/\./g,'').replace(',','.');}
  const v=parseFloat(str); return isNaN(v)?0:v;
}
function fmtBRL(n){return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function fmtDate(iso){ if(!iso)return ''; const p=String(iso).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:iso; }
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

function load(){
  let raw=null;
  try{ raw = storageOK?localStorage.getItem(KEY):mem[KEY]; }catch(e){ raw=mem[KEY]; }
  if(!raw){ try{ raw = storageOK?localStorage.getItem(KEY+'_bak'):null; }catch(e){} }
  if(raw){ try{ const o=JSON.parse(raw); DB=Object.assign({compras:[],fornecedores:[],categorias:[],_editedAt:0},o); }catch(e){} }
  if(!Array.isArray(DB.compras))DB.compras=[];
}
function save(stamp){
  if(stamp!==false && !(FB.applying||FB.booting)) DB._editedAt=Date.now();
  rebuildLookups();
  const data=JSON.stringify(DB);
  try{ if(storageOK){ localStorage.setItem(KEY,data); localStorage.setItem(KEY+'_bak',data); } else mem[KEY]=data; }
  catch(e){ mem[KEY]=data; storageOK=false; }
  if(typeof fbQueuePush==='function') fbQueuePush();
}
function rebuildLookups(){
  const fs=new Set(DB.fornecedores||[]), cs=new Set(DB.categorias||[]);
  DB.compras.forEach(c=>{ if(c.fornecedor)fs.add(c.fornecedor); if(c.categoria)cs.add(c.categoria); });
  DB.fornecedores=[...fs].filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR'));
  DB.categorias=[...cs].filter(Boolean).sort((a,b)=>a.localeCompare(b,'pt-BR'));
}

/* ============ filtros / cálculos (puros) ============ */
function isOverdue(c){ return !!(!c.pago && c.vencimento && c.vencimento < todayISO()); }
function filterCompras(list, f){
  const q=(f.q||'').trim().toLowerCase();
  return list.filter(c=>{
    if(f.month && (c.dataCompra||'').slice(0,7)!==f.month) return false;
    if(f.forn && c.fornecedor!==f.forn) return false;
    if(f.pay==='pago' && !c.pago) return false;
    if(f.pay==='pend' && c.pago) return false;
    if(q){ const hay=((c.fornecedor||'')+' '+(c.descricao||'')+' '+(c.categoria||'')+' '+(c.obs||'')).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
}
function sortCompras(list){
  return list.slice().sort((a,b)=>{
    const da=(a.dataCompra||''), db=(b.dataCompra||'');
    if(da!==db) return da<db?1:-1;          // mais recente primeiro
    return (b.criadoEm||0)-(a.criadoEm||0);
  });
}
function computeTotals(list){
  let total=0,pago=0,aPagar=0,over=0;
  list.forEach(c=>{ const v=Number(c.valor)||0; total+=v; if(c.pago)pago+=v; else {aPagar+=v; if(isOverdue(c))over+=v;} });
  return {total:round2(total),pago:round2(pago),aPagar:round2(aPagar),over:round2(over),count:list.length};
}
function currentFilters(){
  return {q:document.getElementById('q').value, month:document.getElementById('fMonth').value, forn:document.getElementById('fForn').value, pay:payFilter};
}

/* ============ render ============ */
function render(){
  rebuildLookups();
  // selects de fornecedor
  const selF=document.getElementById('fForn'), cur=selF.value;
  selF.innerHTML='<option value="">Todos fornecedores</option>'+DB.fornecedores.map(f=>`<option value="${esc(f)}">${esc(f)}</option>`).join('');
  if([...selF.options].some(o=>o.value===cur)) selF.value=cur;
  // datalists do form
  document.getElementById('fornList').innerHTML=DB.fornecedores.map(f=>`<option value="${esc(f)}"></option>`).join('');
  document.getElementById('catList').innerHTML=DB.categorias.map(c=>`<option value="${esc(c)}"></option>`).join('');

  const f=currentFilters();
  const filtered=sortCompras(filterCompras(DB.compras,f));
  const t=computeTotals(filtered);

  document.getElementById('stats').innerHTML=
    stat('Compras', String(t.count), '')+
    stat('Total', fmtBRL(t.total), '')+
    stat('A pagar', fmtBRL(t.aPagar), 'pay')+
    stat('Pago', fmtBRL(t.pago), 'paid');

  const list=document.getElementById('list');
  if(!filtered.length){
    list.innerHTML='<div class="empty">Nenhuma compra'+(DB.compras.length?' com esses filtros.':' ainda. Toque em <b>Nova compra</b> para começar.')+'</div>';
    return;
  }
  list.innerHTML=filtered.map(rowHTML).join('');
}
function stat(k,v,cls){return `<div class="stat ${cls}"><div class="k">${k}</div><div class="v">${v}</div></div>`;}
function rowHTML(c){
  const over=isOverdue(c);
  const payTag = c.pago?'<span class="tag ok">✓ pago</span>'
    : over?`<span class="tag over">vencido ${fmtDate(c.vencimento)}</span>`
    : (c.vencimento?`<span class="tag pend">vence ${fmtDate(c.vencimento)}</span>`:'<span class="tag pend">a pagar</span>');
  const delivTag = c.entregue?'<span class="tag deliv">entregue</span>'
    : (c.dataEntrega?`<span class="tag wait">entrega ${fmtDate(c.dataEntrega)}</span>`:'');
  const meta=[];
  if(c.categoria) meta.push(`<span class="tag cat">${esc(c.categoria)}</span>`);
  if(c.prazo) meta.push(`<span class="tag">${esc(c.prazo)}</span>`);
  meta.push(payTag); if(delivTag)meta.push(delivTag);
  return `<div class="row${over?' over':''}">
    <div class="acts">
      <button class="iconbtn" title="Editar" onclick="openForm('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <button class="iconbtn pay" title="${c.pago?'Marcar como a pagar':'Marcar como pago'}" onclick="togglePago('${c.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${c.pago?'<path d="M3 12h18"/>':'<path d="M20 6L9 17l-5-5"/>'}</svg></button>
    </div>
    <div class="main">
      <div class="forn">${esc(c.fornecedor||'—')}</div>
      <div class="desc">${esc(c.descricao||'')}</div>
      <div class="meta">${meta.join('')}</div>
    </div>
    <div class="side">
      <div class="val">${fmtBRL(c.valor)}</div>
      <div class="when">compra ${fmtDate(c.dataCompra)||'—'}</div>
    </div>
  </div>`;
}

/* ============ form ============ */
function openForm(id){
  editingId=id||null;
  const g=k=>document.getElementById(k);
  if(editingId){
    const c=DB.compras.find(x=>x.id===editingId)||{};
    document.getElementById('formTitle').textContent='Editar compra';
    document.getElementById('delBtn').classList.remove('hidden');
    g('i_forn').value=c.fornecedor||''; g('i_desc').value=c.descricao||'';
    g('i_valor').value=c.valor!=null?String(c.valor).replace('.',','):'';
    g('i_cat').value=c.categoria||''; g('i_dcompra').value=c.dataCompra||'';
    g('i_dentrega').value=c.dataEntrega||''; g('i_prazo').value=c.prazo||'';
    g('i_venc').value=c.vencimento||''; g('i_pago').checked=!!c.pago; g('i_entregue').checked=!!c.entregue;
    g('i_obs').value=c.obs||'';
  } else {
    document.getElementById('formTitle').textContent='Nova compra';
    document.getElementById('delBtn').classList.add('hidden');
    ['i_forn','i_desc','i_valor','i_cat','i_dentrega','i_prazo','i_venc','i_obs'].forEach(k=>g(k).value='');
    g('i_dcompra').value=todayISO(); g('i_pago').checked=false; g('i_entregue').checked=false;
  }
  render(); // popula datalists
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(()=>g('i_forn').focus(),50);
}
function closeForm(){document.getElementById('formOverlay').classList.remove('open');}
function saveForm(){
  const g=k=>document.getElementById(k).value;
  const forn=g('i_forn').trim(), desc=g('i_desc').trim();
  if(!forn){alert('Informe de quem você comprou.');return;}
  if(!desc){alert('Informe o que você comprou.');return;}
  const rec={
    fornecedor:forn, descricao:desc, valor:round2(parseBRL(g('i_valor'))),
    categoria:g('i_cat').trim(), dataCompra:g('i_dcompra')||todayISO(), dataEntrega:g('i_dentrega'),
    prazo:g('i_prazo').trim(), vencimento:g('i_venc'),
    pago:document.getElementById('i_pago').checked, entregue:document.getElementById('i_entregue').checked,
    obs:g('i_obs').trim()
  };
  if(editingId){ const c=DB.compras.find(x=>x.id===editingId); if(c)Object.assign(c,rec); }
  else { rec.id=uid(); rec.criadoEm=Date.now(); DB.compras.unshift(rec); }
  save(); render(); closeForm(); toast(editingId?'Compra atualizada':'Compra registrada');
}
function deleteCurrent(){
  if(!editingId)return;
  if(!confirm('Excluir esta compra? Esta ação não pode ser desfeita.'))return;
  DB.compras=DB.compras.filter(x=>x.id!==editingId);
  save(); render(); closeForm(); toast('Compra excluída');
}
function togglePago(id){
  const c=DB.compras.find(x=>x.id===id); if(!c)return;
  c.pago=!c.pago; save(); render(); toast(c.pago?'Marcada como paga':'Marcada como a pagar');
}
function setPay(v){ payFilter=v; [...document.querySelectorAll('#fPay button')].forEach(b=>b.classList.toggle('on',b.dataset.v===v)); render(); }

/* ============ menu / export ============ */
function openMenu(){ document.getElementById('menuStat').textContent=DB.compras.length+' compra(s) · última edição '+(DB._editedAt?new Date(DB._editedAt).toLocaleString('pt-BR'):'—'); document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu(){ document.getElementById('menuOverlay').classList.remove('open'); }
function download(name,content,type){
  const blob=new Blob([content],{type:type||'application/octet-stream'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name;
  document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}
function exportJSON(){ download('compras-backup-'+todayISO()+'.json', JSON.stringify(DB,null,2), 'application/json'); toast('Backup gerado'); }
function csvCell(s){ s=String(s==null?'':s); return /[";\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function exportCSV(){
  const f=currentFilters(); const rows=sortCompras(filterCompras(DB.compras,f));
  const head=['Data compra','Fornecedor','Item','Categoria','Valor','Prazo','Vencimento','Pago','Data entrega','Entregue','Observações'];
  const lines=[head.join(';')];
  rows.forEach(c=>lines.push([fmtDate(c.dataCompra),c.fornecedor,c.descricao,c.categoria,String(c.valor==null?'':c.valor).replace('.',','),c.prazo,fmtDate(c.vencimento),c.pago?'Sim':'Não',fmtDate(c.dataEntrega),c.entregue?'Sim':'Não',c.obs].map(csvCell).join(';')));
  download('compras-'+todayISO()+'.csv','\ufeff'+lines.join('\r\n'),'text/csv;charset=utf-8'); toast(rows.length+' linha(s) exportada(s)');
}
function importJSON(ev){
  const file=ev.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{
    const o=JSON.parse(rd.result);
    if(!o||!Array.isArray(o.compras)) throw 0;
    if(!confirm('Restaurar este backup vai substituir as compras atuais ('+DB.compras.length+'). Continuar?'))return;
    DB=Object.assign({compras:[],fornecedores:[],categorias:[],_editedAt:0},o);
    save(); render(); closeMenu(); toast('Backup restaurado');
  }catch(e){ alert('Arquivo inválido.'); } };
  rd.readAsText(file); ev.target.value='';
}

/* ============ tema ============ */
function applyTema(){ const t=localStorage_get('rm_compras_tema')||'light'; document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light'); }
function toggleTema(){ const cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light'; const nx=cur==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',nx); localStorage_set('rm_compras_tema',nx); }
function localStorage_get(k){ try{return storageOK?localStorage.getItem(k):mem[k];}catch(e){return mem[k];} }
function localStorage_set(k,v){ try{ if(storageOK)localStorage.setItem(k,v); else mem[k]=v; }catch(e){mem[k]=v;} }

/* ============ toast ============ */
let toastT=null;
function toast(msg){
  let el=document.getElementById('toast');
  if(!el){ el=document.createElement('div'); el.id='toast'; el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1d2127;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .2s'; document.body.appendChild(el); }
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(toastT); toastT=setTimeout(()=>{el.style.opacity='0';},2200);
}

/* ============ Firebase (rm-contas / nó compras_rm) ============ */
const FB={
  config:{apiKey:"AIzaSyBDOR9f748UNoGP5c72Y-vdmDBcffM8tMI",databaseURL:"https://rm-contas-default-rtdb.firebaseio.com",appId:"1:414740463069:web:f8035314dcfbf962c80a34"},
  node:'compras_rm', ref:null, ready:false, applying:false, booting:true, timer:null
};
function setSync(state){
  const c=document.getElementById('syncChip'); if(!c)return;
  const map={ok:['● nuvem','#143b27','#7fe0a8'],saving:['● salvando…','#3a3320','#ffd98a'],off:['● local','#2a2a2a','#bbb'],pend:['● pendente','#3a3320','#ffd98a']};
  const m=map[state]||map.off; c.textContent=m[0]; c.style.background=m[1]; c.style.color=m[2];
}
function cloudData(){ const o=JSON.parse(JSON.stringify(DB)); o._updatedAt=Date.now(); return o; }
function fbInit(){
  try{
    if(!window.firebase||!firebase.initializeApp){ setSync('off'); return; }
    firebase.initializeApp(FB.config);
    FB.ref=firebase.database().ref(FB.node);
    FB.ready=true; setSync('saving');
    FB.ref.on('value',snap=>{
      const v=snap.val();
      if(!v){ if((DB.compras||[]).length) fbPush(); else setSync('ok'); return; }
      const remote=v._updatedAt||0, local=DB._editedAt||0;
      if(remote>=local){ fbApply(v); } else { fbPush(); }
    },err=>{ setSync('off'); });
  }catch(e){ setSync('off'); }
}
function fbApply(v){
  FB.applying=true;
  DB=Object.assign({compras:[],fornecedores:[],categorias:[],_editedAt:0},v);
  DB._editedAt=v._updatedAt||DB._editedAt||0;
  save(false); render(); FB.applying=false; setSync('ok');
}
function fbPush(){ if(!FB.ready||!FB.ref)return; setSync('saving'); FB.ref.set(cloudData()).then(()=>setSync('ok')).catch(()=>setSync('off')); }
function fbQueuePush(){ if(!FB.ready||FB.applying||FB.booting)return; setSync('saving'); clearTimeout(FB.timer); FB.timer=setTimeout(fbPush,700); }
function fbForcePush(){ if(!FB.ready){toast('Nuvem indisponível');return;} fbPush(); toast('Enviado à nuvem'); closeMenu(); }
function fbForcePull(){ if(!FB.ready||!FB.ref){toast('Nuvem indisponível');return;} FB.ref.once('value').then(s=>{const v=s.val(); if(v){fbApply(v);toast('Baixado da nuvem');} else toast('Nuvem vazia');}); closeMenu(); }
function fbStatusClick(){ if(!FB.ready){toast('Sincronização offline — dados salvos só neste aparelho');return;} fbForcePull(); }

/* ============ boot ============ */
load(); applyTema(); render();
FB.booting=false; fbInit();

/* overlays: fecha clicando fora */
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o){ o.classList.remove('open'); } }));
/* salva ao sair */
if(window.addEventListener){ window.addEventListener('pagehide',()=>save(false)); }
/* service worker */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
